name: "CI Eval Comment"

on:
  workflow_run:
    workflows: ["CI Eval & Gamification"]
    types: [completed]

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  post-score-comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR Context
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prFromRun = context.payload.workflow_run.pull_requests?.[0];
            if (!prFromRun?.number) {
              core.setOutput('pr_number', '');
              core.setOutput('is_fork', 'true');
              return;
            }

            const prNumber = prFromRun.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const headRepo = pr.data.head?.repo?.full_name || '';
            const isFork = headRepo && headRepo !== `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('is_fork', isFork ? 'true' : 'false');

      - name: Skip Fork PRs
        if: steps.pr.outputs.is_fork == 'true'
        run: echo "Fork PR detected; skipping comment step to avoid token permission errors."

      - name: Download Score Summary
        id: download
        if: steps.pr.outputs.is_fork == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const runId = context.payload.workflow_run.id;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const artifact = artifacts.data.artifacts.find((item) => item.name === 'score-summary');
            if (!artifact) {
              core.setOutput('has_artifact', 'false');
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });

            const temp = path.join('${{ runner.temp }}', 'artifacts');
            if (!fs.existsSync(temp)) {
              fs.mkdirSync(temp, { recursive: true });
            }

            fs.writeFileSync(path.join(temp, 'score-summary.zip'), Buffer.from(download.data));
            core.setOutput('has_artifact', 'true');

      - name: Unzip Score Summary
        if: steps.pr.outputs.is_fork == 'false' && steps.download.outputs.has_artifact == 'true'
        run: unzip "${{ runner.temp }}/artifacts/score-summary.zip" -d "${{ runner.temp }}/artifacts"

      - name: Post PR Score Comment
        if: steps.pr.outputs.is_fork == 'false' && steps.download.outputs.has_artifact == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const temp = path.join('${{ runner.temp }}', 'artifacts');
            const summaryPath = path.join(temp, 'score-summary.json');
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));

            const passed = parseInt(summary.passed || '0', 10);
            const failed = parseInt(summary.failed || '0', 10);
            const score = parseInt(summary.score || '0', 10);
            const conclusion = summary.conclusion || 'skipped';
            const packName = summary.pack || 'unknown';
            const prNumber = Number(summary.pr_number || '${{ steps.pr.outputs.pr_number }}');

            if (!prNumber) {
              core.setFailed('Could not determine pull request number');
              return;
            }

            const emoji = conclusion === 'success' ? '✅' : '❌';
            let message = `## Test & Gamification Skor Tablosu 🏆\n\n`;
            message += `**Hedef Paket:** \`${packName}\`\n`;
            message += `**Durum:** ${emoji}\n\n`;

            message += `| Metrik | Değer |\n`;
            message += `| :--- | :--- |\n`;
            message += `| 🟢 Geçen Testler | **${passed}** |\n`;
            message += `| 🔴 Kalan Testler | **${failed}** |\n`;
            message += `| ⭐ **Kazanılan Puan** | **${score} XP** |\n\n`;

            if (conclusion !== 'success') {
              message += `**⚠️ PR'ın Merge edilebilmesi için tüm testlerin geçmesi zorunludur!** Lütfen paketinizi düzeltin.`;
            } else {
              message += `🎉 Tebrikler! Tüm testler başarıyla geçti.`;
            }

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });